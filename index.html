<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный тест по HTML и CSS (с сохранением прогресса)</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --primary-hover: #3b5984;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --correct-color: #2ecc71;
            --incorrect-color: #e74c3c;
            --warning-color: #e67e22;
            --warning-hover: #d35400;
            --selected-bg: #eef2f7;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 750px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        header {
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-align: center;
        }

        .progress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #7f8c8d;
        }

        .progress-bar-outer {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            width: 70%;
            overflow: hidden;
        }

        .progress-bar-inner {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-section {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            background-color: #fff;
            border: 2px solid #e0e0e0;
            border-radius: var(--border-radius);
            padding: 14px 20px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-item:hover:not(.disabled) {
            border-color: var(--primary-color);
            background-color: var(--selected-bg);
        }

        .option-item.correct {
            border-color: var(--correct-color);
            background-color: #e8f8f0;
            color: #27ae60;
            font-weight: 600;
        }

        .option-item.incorrect {
            border-color: var(--incorrect-color);
            background-color: #fdedec;
            color: #c0392b;
            font-weight: 600;
        }

        .option-item.disabled {
            cursor: not-allowed;
            pointer-events: none;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            text-align: center;
        }

        .btn-nav {
            background-color: #e0e0e0;
            color: #555;
        }

        .btn-nav:hover:not(:disabled) {
            background-color: #d0d0d0;
        }

        .btn-early {
            background-color: var(--warning-color);
            color: white;
        }

        .btn-early:hover {
            background-color: var(--warning-hover);
        }

        .btn-action {
            background-color: var(--primary-color);
            color: #fff;
        }

        .btn-action:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .result-screen {
            display: none;
            text-align: center;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            font-size: 32px;
            font-weight: bold;
        }

        .score-label {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: normal;
        }

        .review-section {
            margin-top: 30px;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            padding: 15px;
            background: #fafafa;
        }

        .review-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .review-q {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .review-ans {
            font-size: 14px;
        }

        .text-correct { color: var(--correct-color); }
        .text-incorrect { color: var(--incorrect-color); }
        .text-muted { color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <header>
            <h1>Тестирование: HTML и CSS</h1>
            <div class="progress-container">
                <div class="progress-bar-outer">
                    <div id="progress-bar" class="progress-bar-inner"></div>
                </div>
                <span id="progress-text">Вопрос 1 из 100</span>
            </div>
        </header>

        <main class="question-section">
            <div id="question-box" class="question-text">Загрузка вопроса...</div>
            <ul id="options-box" class="options-list"></ul>
        </main>

        <footer>
            <div class="navigation-buttons">
                <button id="btn-prev" class="btn-nav" disabled onclick="prevQuestion()">Назад</button>
                <button id="btn-early" class="btn-early" onclick="finishEarly()">Завершить досрочно</button>
                <button id="btn-next" class="btn-action" disabled onclick="nextQuestion()">Далее</button>
            </div>
        </footer>
    </div>

    <div id="result-screen" class="result-screen">
        <h1>Тест Завершен!</h1>
        <div class="score-circle">
            <span id="score-percent">0%</span>
            <span class="score-label"><span id="score-count">0</span> / 100</span>
        </div>
        <p id="result-message" style="font-size: 18px; margin-bottom: 20px; font-weight: 500;"></p>
        <button class="btn-action" style="margin: 0 auto; display: block; max-width: 250px;" onclick="restartQuiz()">Пройти заново</button>
        
        <div class="review-section">
            <h3>Анализ всех ответов:</h3>
            <div id="review-list"></div>
        </div>
    </div>
</div>

<script>
    // Массив из 100 вопросов
    const quizData = [
        { q: "1. Какой тег используется для создания гиперссылки в HTML?", options: ["a) <a>", "b) <link>", "c) <button>", "d) <href>", "e) <url>"], correct: 0 },
        { q: "2. Какой атрибут используется для указания адреса веб-страницы в теге <a>?", options: ["a) src", "b) url", "c) href", "d) link", "e) address"], correct: 2 },
        { q: "3. Как в CSS задать красный цвет фона для элемента?", options: ["a) background-color: red;", "b) color: red;", "c) bg-color: red;", "d) background: red;", "e) text-color: red;"], correct: 0 },
        { q: "4. Какой тег используется для вставки изображения в HTML?", options: ["a) <img>", "b) <picture>", "c) <image>", "d) <src>", "e) <figure>"], correct: 0 },
        { q: "5. Как задать размер шрифта в CSS?", options: ["a) font-size: 12px;", "b) font-size: 12pt;", "c) text-size: 12px;", "d) size: 12px;", "e) font: 12px;"], correct: 0 },
        { q: "6. Какое свойство в CSS используется для изменения цвета текста?", options: ["a) text-color", "b) font-color", "c) color", "d) text-style", "e) text-background"], correct: 2 },
        { q: "7. Как сделать текст жирным в HTML?", options: ["a) <bold>", "b) <strong>", "c) <b>", "d) ...", "e) <fat>"], correct: 1 },
        { q: "8. Как можно задать ширину элемента в CSS?", options: ["a) width: 200px;", "b) height: 200px;", "c) element-width: 200px;", "d) size: 200px;", "e) resize: 200px;"], correct: 0 },
        { q: "9. Как задать стиль для всех абзацев на странице?", options: ["a) p { font-size: 16px; }", "b) p { size: 16px; }", "c) p: 16px { font-size; }", "d) text { p: 16px; }", "e) all p { font-size: 16px; }"], correct: 0 },
        { q: "10. Как вставить комментарий в CSS?", options: ["a) ", "b) /* Это комментарий */", "c) // Это комментарий", "d) # Это комментарий", "e) %% Это комментарий %%"], correct: 1 },
        { q: "11. Какой атрибут используется для задания альтернативного текста для изображения?", options: ["a) alt", "b) src", "c) title", "d) image-text", "e) caption"], correct: 0 },
        { q: "12. Какой тег используется для создания списка элементов в HTML?", options: ["a) <list>", "b) <ol>", "c) <ul>", "d) <li>", "e) <dl>"], correct: 2 },
        { q: "13. Как задать цвет фона всей страницы с помощью CSS?", options: ["a) background-color: #FFFFFF;", "b) body { background-color: #FFFFFF; }", "c) background: #FFFFFF;", "d) color: #FFFFFF;", "e) page-background: #FFFFFF;"], correct: 1 },
        { q: "14. Как задать отступы между ячейками таблицы в CSS?", options: ["a) cell-spacing", "b) border-spacing", "c) cell-padding", "d) table-spacing", "e) table-padding"], correct: 1 },
        { q: "15. Как в HTML выделить текст курсивом?", options: ["a) <italic>", "b) <i>", "c) <em>", "d) <italic-text>", "e) <cursive>"], correct: 1 },
        { q: "16. Как задать шрифт для текста в CSS?", options: ["a) font-family: Arial;", "b) text-font: Arial;", "c) font-type: Arial;", "d) font: Arial;", "e) text-style: Arial;"], correct: 0 },
        { q: "17. Как сделать изображение растянутым по всей ширине страницы?", options: ["a) img { width: 100%; }", "b) img { width: 100vw; }", "c) img { height: 100%; }", "d) img { display: block; width: 100%; }", "e) img { size: 100%; }"], correct: 0 },
        { q: "18. Как добавить внутренний отступ для элемента в CSS?", options: ["a) padding: 20px;", "b) margin: 20px;", "c) border: 20px;", "d) space: 20px;", "e) gap: 20px;"], correct: 0 },
        { q: "19. Как установить внешний отступ для элемента в CSS?", options: ["a) padding: 20px;", "b) margin: 20px;", "c) border: 20px;", "d) gap: 20px;", "e) space: 20px;"], correct: 1 },
        { q: "20. Как сделать элемент блочным в CSS?", options: ["a) display: block;", "b) display: inline;", "c) block: true;", "d) element: block;", "e) type: block;"], correct: 0 },
        { q: "21. Как скрыть элемент в HTML?", options: ["a) visibility: hidden;", "b) display: none;", "c) remove: true;", "d) hide: true;", "e) opacity: 0;"], correct: 1 },
        { q: "22. Как задать стили для элементов с определенным классом в CSS?", options: ["a) #classname { ... }", "b) .classname { ... }", "c) classname { ... }", "d) class: classname { ... }", "e) class { ... }"], correct: 1 },
        { q: "23. Как в CSS задать шрифт для текста, если не доступен основной шрифт?", options: ["a) font-family: Arial, sans-serif;", "b) font: Arial, sans-serif;", "c) font-type: Arial, sans-serif;", "d) font: sans-serif, Arial;", "e) text-font: Arial, sans-serif;"], correct: 0 },
        { q: "24. Какой тег используется для создания таблицы в HTML?", options: ["a) <list>", "b) <table>", "c) <tr>", "d) <td>", "e) <th>"], correct: 1 },
        { q: "25. Как задать горизонтальный отступ для элемента в CSS?", options: ["a) horizontal-margin: 20px;", "b) padding-left: 20px;", "c) margin-left: 20px;", "d) left-spacing: 20px;", "e) margin: 20px left;"], correct: 2 },
        { q: "26. Как задать стиль для всех ссылок на странице?", options: ["a) a { color: blue; }", "b) link { color: blue; }", "c) a:active { color: blue; }", "d) link:all { color: blue; }", "e) a { style: blue; }"], correct: 0 },
        { q: "27. Как задать полосу прокрутки для блока с помощью CSS?", options: ["a) overflow: scroll;", "b) scroll: true;", "c) scroll: visible;", "d) overflow-x: scroll;", "e) scrolling: auto;"], correct: 0 },
        { q: "28. Как задать стиль для всех элементов на странице, кроме ссылок?", options: ["a) * { ... }", "b) :not(a) { ... }", "c) except(a) { ... }", "d) all { ... }", "e) all-except(a) { ... }"], correct: 1 },
        { q: "29. Как объединить два элемента в один с помощью flexbox?", options: ["a) display: flex;", "b) display: grid;", "c) display: block;", "d) flex: wrap;", "e) flexbox: true;"], correct: 0 },
        { q: "30. Как в CSS изменить цвет текста при наведении курсора?", options: ["a) a:hover { color: red; }", "b) a:click { color: red; }", "c) a:active { color: red; }", "d) a:focus { color: red; }", "e) a:hover { text-color: red; }"], correct: 0 },
        { q: "31. Как задать шрифт Arial для всего документа?", options: ["a) font-family: Arial;", "b) font: Arial;", "c) font-style: Arial;", "d) text-font: Arial;", "e) all-font-family: Arial;"], correct: 0 },
        { q: "32. Как задать верхний отступ для элемента в CSS?", options: ["a) top: 20px;", "b) padding-top: 20px;", "c) margin-top: 20px;", "d) border-top: 20px;", "e) gap-top: 20px;"], correct: 2 },
        { q: "33. Как задать прозрачность для элемента в CSS?", options: ["a) opacity: 0.5;", "b) transparency: 0.5;", "c) visibility: 0.5;", "d) background-opacity: 0.5;", "e) alpha: 0.5;"], correct: 0 },
        { q: "34. Как задать горизонтальное выравнивание текста по центру?", options: ["a) text-align: center;", "b) align: center;", "c) horizontal-align: center;", "d) center-align: true;", "e) text: center;"], correct: 0 },
        { q: "35. Как добавить подчеркивание для текста в HTML?", options: ["a) <underline>", "b) <u>", "c) <strike>", "d) <mark>", "e) <underlined>"], correct: 1 },
        { q: "36. Как задать тип списка в HTML (нумерованный или маркированный)?", options: ["a) <ol> для маркированного и <ul> для нумерованного", "b) <ul> для маркированного и <ol> для нумерованного", "c) <list> для маркированного и <ol> для нумерованного", "d) <unordered-list> и <ordered-list>", "e) <list> для обоих"], correct: 1 },
        { q: "37. Какую единицу измерения следует использовать для задания шрифта в процентах от родительского элемента?", options: ["a) %", "b) em", "c) rem", "d) pt", "e) px"], correct: 1 },
        { q: "38. Как задать оиднаковый отступ для всех сторон элемента?", options: ["a) margin: 10px;", "b) padding: 10px;", "c) border: 10px;", "d) space: 10px;", "e) gap: 10px;"], correct: 0 },
        { q: "39. Как сделать элементы страницы адаптивными для разных экранов с помощью CSS?", options: ["a) @media", "b) responsive", "c) flexbox", "d) scale", "e) viewport"], correct: 0 },
        { q: "40. Как задать шрифт в виде курсивного?", options: ["a) font-style: italic;", "b) font-weight: italic;", "c) font-italic: true;", "d) text-style: italic;", "e) font: italic;"], correct: 0 },
        { q: "41. Как сделать все изображения на странице ссылками?", options: ["a) <a href=\"...\"><img src=\"...\"></a>", "b) <img href=\"...\">", "c) <link><img></link>", "d) <a src=\"...\"><img></a>", "e) <a><img href=\"...\"></a>"], correct: 0 },
        { q: "42. Как задать свойство для отображения элемента как инлайн-элемент?", options: ["a) display: inline;", "b) display: block;", "c) visibility: inline;", "d) inline: true;", "e) float: inline;"], correct: 0 },
        { q: "43. Как изменить цвет фона для всех ссылок на странице при наведении?", options: ["a) a:hover { background-color: red; }", "b) a:visited { background-color: red; }", "c) a:focus { background-color: red; }", "d) a:hover { color: red; }", "e) a:active { background-color: red; }"], correct: 0 },
        { q: "44. Как задать шрифт для текста с резервным вариантом?", options: ["a) font-family: Arial, sans-serif;", "b) font: Arial, sans-serif;", "c) text-font: Arial, sans-serif;", "d) font-type: Arial, sans-serif;", "e) font-family: sans-serif, Arial;"], correct: 0 },
        { q: "45. Какой тег используется для создания раздела в HTML?", options: ["a) <section>", "b) <div>", "c) <article>", "d) <section-div>", "e) <block>"], correct: 0 },
        { q: "46. Как в CSS задать фоновое изображение для элемента?", options: ["a) background-image: url('image.jpg');", "b) image-background: url('image.jpg');", "c) background: image('image.jpg');", "d) url-background: 'image.jpg';", "e) background-image: 'image.jpg';"], correct: 0 },
        { q: "47. Как сделать текст с большим размером?", options: ["a) font-size: large;", "b) font-size: 24px;", "c) text-size: 24px;", "d) size: 24px;", "e) font-size: bigger;"], correct: 1 },
        { q: "48. Как задать размер изображения в HTML?", options: ["a) width=\"200\" height=\"200\"", "b) width: 200px; height: 200px;", "c) img { width: 200px; height: 200px; }", "d) <img size=\"200px\">", "e) image { width: 200px; height: 200px; }"], correct: 0 },
        { q: "49. Как включить шрифты Google в HTML?", options: ["a) <link href=\"https://fonts.googleapis.com/css?family=Roboto\" rel=\"stylesheet\">", "b) <script src=\"https://fonts.googleapis.com/css?family=Roboto\">", "c) <font href=\"https://fonts.googleapis.com/css?family=Roboto\">", "d) <link href=\"https://fonts.com/css?family=Roboto\" rel=\"stylesheet\">", "e) <googlefont src=\"Roboto\">"], correct: 0 },
        { q: "50. Как в CSS задать ширину границы для элемента?", options: ["a) border-width: 2px;", "b) border-size: 2px;", "c) width-border: 2px;", "d) border: width 2px;", "e) border-thickness: 2px;"], correct: 0 },
        { q: "51. Как в HTML добавить комментарий?", options: ["a) ", "b) // Это комментарий", "c) /* Это комментарий */", "d) ", "e) # Это комментарий"], correct: 0 },
        { q: "52. Как задать высоту элемента в CSS?", options: ["a) height: 200px;", "b) size: 200px;", "c) length: 200px;", "d) vertical: 200px;", "e) height: 200%;"], correct: 0 },
        { q: "53. Как вставить текст в элемент div?", options: ["a) div { content: \"Hello\"; }", "b) <div>Hello</div>", "c) div:content(\"Hello\");", "d) div { text: \"Hello\"; }", "e) <div text=\"Hello\"></div>"], correct: 1 },
        { q: "54. Как задать внешний отступ для всех элементов на странице?", options: ["a) * { margin: 10px; }", "b) * { padding: 10px; }", "c) all { margin: 10px; }", "d) all-elements { margin: 10px; }", "e) * { border: 10px; }"], correct: 0 },
        { q: "55. Как создать нумерованный список в HTML?", options: ["a) <ul>", "b) <dl>", "c) <ol>", "d) <list>", "e) <li>"], correct: 2 },
        { q: "56. Как задать жирный шрифт для текста в CSS?", options: ["a) font-weight: bold;", "b) font-size: bold;", "c) font-style: bold;", "d) font: bold;", "e) weight: bold;"], correct: 0 },
        { q: "57. Как сделать элемент сокрытым с помощью CSS?", options: ["a) visibility: hidden;", "b) display: none;", "c) visibility: none;", "d) hidden: true;", "e) opacity: 0;"], correct: 1 },
        { q: "58. Как задать цвет фонда для таблицы в HTML?", options: ["a) <table background=\"color\">", "b) table { background-color: #FFFFFF; }", "c) <table bgcolor=\"color\">", "d) table { background: color; }", "e) table { color-background: color; }"], correct: 1 },
        { q: "59. Как задать стиль для тега <h1> в CSS?", options: ["a) h1 { font-size: 24px; }", "b) h1 { size: 24px; }", "c) h1 { font: 24px; }", "d) h1: 24px { size; }", "e) h1-style { size: 24px; }"], correct: 0 },
        { q: "60. Как задать рамку вокруг элемента в CSS?", options: ["a) border: 1px solid black;", "b) frame: 1px solid black;", "c) border-style: solid;", "d) outline: 1px solid black;", "e) box-border: 1px solid black;"], correct: 0 },

        { q: "100. Как в HTML создать форму для ввода текста?", options: ["a) <form><input type=\"text\" name=\"user\"></form>", "b) <form><textarea></textarea></form>", "c) <form><text-input></text-input></form>", "d) <form><input text=\"user\"></form>", "e) <input type=\"form-text\" name=\"user\">"], correct: 0 }
    ];

    let currentQuestionIndex = 0;
    let userAnswers = new Array(quizData.length).fill(null);

    const questionBox = document.getElementById("question-box");
    const optionsBox = document.getElementById("options-box");
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    const btnPrev = document.getElementById("btn-prev");
    const btnNext = document.getElementById("btn-next");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");

    // Функции для работы с памятью браузера (LocalStorage)
    function saveProgress() {
        localStorage.setItem("quiz_html_css_index", currentQuestionIndex);
        localStorage.setItem("quiz_html_css_answers", JSON.stringify(userAnswers));
        localStorage.setItem("quiz_html_css_completed", "false");
    }

    function loadQuestion() {
        const currentQuestion = quizData[currentQuestionIndex];
        
        questionBox.textContent = currentQuestion.q;
        optionsBox.innerHTML = "";

        const answeredIndex = userAnswers[currentQuestionIndex];

        currentQuestion.options.forEach((option, index) => {
            const li = document.createElement("li");
            li.className = "option-item";
            li.textContent = option; 
            
            if (answeredIndex !== null) {
                li.classList.add("disabled");
                if (index === currentQuestion.correct) {
                    li.classList.add("correct");
                } else if (index === answeredIndex) {
                    li.classList.add("incorrect");
                }
            } else {
                li.onclick = () => selectOption(index);
            }

            optionsBox.appendChild(li);
        });

        const progressPercent = ((currentQuestionIndex + 1) / quizData.length) * 100;
        progressBar.style.width = `${progressPercent}%`;
        progressText.textContent = `Вопрос ${currentQuestionIndex + 1} из ${quizData.length}`;

        btnPrev.disabled = currentQuestionIndex === 0;
        
        if (answeredIndex === null) {
            btnNext.disabled = true;
        } else {
            btnNext.disabled = false;
        }

        if (currentQuestionIndex === quizData.length - 1) {
            btnNext.textContent = "Завершить";
            btnNext.style.backgroundColor = "#2ecc71";
        } else {
            btnNext.textContent = "Далее";
            btnNext.style.backgroundColor = "var(--primary-color)";
        }
    }

    function selectOption(index) {
        if (userAnswers[currentQuestionIndex] !== null) return;

        userAnswers[currentQuestionIndex] = index;
        const currentQuestion = quizData[currentQuestionIndex];
        const options = optionsBox.querySelectorAll(".option-item");

        options.forEach((opt, idx) => {
            opt.classList.add("disabled");

            if (idx === currentQuestion.correct) {
                opt.classList.add("correct");
            } else if (idx === index) {
                opt.classList.add("incorrect");
            }
        });

        btnNext.disabled = false;
        saveProgress(); // Сохраняем состояние при выборе ответа
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            saveProgress(); // Сохраняем индекс нового вопроса
            loadQuestion();
        } else {
            showResults();
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            saveProgress(); // Сохраняем индекс предыдущего вопроса
            loadQuestion();
        }
    }

    function finishEarly() {
        const unansweredCount = userAnswers.filter(ans => ans === null).length;
        const confirmMessage = `Вы уверены, что хотите завершить тест досрочно?\nОсталось вопросов без ответа: ${unansweredCount}.`;
        
        if (confirm(confirmMessage)) {
            showResults();
        }
    }

    function showResults() {
        quizScreen.style.display = "none";
        resultScreen.style.display = "block";
        
        // Запоминаем в локальной памяти, что тест завершен
        localStorage.setItem("quiz_html_css_completed", "true");
        localStorage.setItem("quiz_html_css_answers", JSON.stringify(userAnswers));

        let correctCount = 0;
        let answeredCount = 0;
        const reviewList = document.getElementById("review-list");
        reviewList.innerHTML = "";

        quizData.forEach((data, index) => {
            const userAnsIndex = userAnswers[index];
            const isCorrect = userAnsIndex === data.correct;
            
            if (userAnsIndex !== null) {
                answeredCount++;
                if (isCorrect) correctCount++;
            }

            const reviewItem = document.createElement("div");
            reviewItem.className = "review-item";

            const qDiv = document.createElement("div");
            qDiv.className = "review-q";
            qDiv.textContent = data.q;
            reviewItem.appendChild(qDiv);

            const ansDiv = document.createElement("div");
            ansDiv.className = "review-ans";
            
            const userChoiceText = userAnsIndex !== null ? data.options[userAnsIndex] : null;
            const correctChoiceText = data.options[data.correct];

            if (userAnsIndex === null) {
                ansDiv.innerHTML = `<span class="text-muted">Пропущено (нет ответа)</span><br>` + 
                                   `<span class="text-correct">Правильный ответ: ${escapeHtml(correctChoiceText)}</span>`;
            } else if (isCorrect) {
                ansDiv.innerHTML = `<span class="text-correct">✓ Правильно: ${escapeHtml(correctChoiceText)}</span>`;
            } else {
                ansDiv.innerHTML = `<span class="text-incorrect">✗ Ваш ответ: ${escapeHtml(userChoiceText)}</span><br>` +
                                   `<span class="text-correct">  Правильный ответ: ${escapeHtml(correctChoiceText)}</span>`;
            }
            
            reviewItem.appendChild(ansDiv);
            reviewList.appendChild(reviewItem);
        });

        const percent = Math.round((correctCount / quizData.length) * 100);
        document.getElementById("score-percent").textContent = `${percent}%`;
        document.getElementById("score-count").textContent = correctCount;

        let msg = "";
        if (percent >= 90) msg = "Отличный результат! Вы превосходно знаете HTML и CSS.";
        else if (percent >= 70) msg = "Хороший результат! Но есть над чем поработать.";
        else msg = "Вам стоит повторить основы HTML и CSS.";
        
        document.getElementById("result-message").textContent = msg;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function restartQuiz() {
        // Полностью очищаем память теста при перезапуске
        localStorage.removeItem("quiz_html_css_index");
        localStorage.removeItem("quiz_html_css_answers");
        localStorage.removeItem("quiz_html_css_completed");

        currentQuestionIndex = 0;
        userAnswers = new Array(quizData.length).fill(null);
        resultScreen.style.display = "none";
        quizScreen.style.display = "block";
        loadQuestion();
    }

    // Восстановление состояния при загрузке страницы
    window.onload = function() {
        const savedIndex = localStorage.getItem("quiz_html_css_index");
        const savedAnswers = localStorage.getItem("quiz_html_css_answers");
        const savedCompleted = localStorage.getItem("quiz_html_css_completed");

        if (savedAnswers) {
            userAnswers = JSON.parse(savedAnswers);
        }

        if (savedCompleted === "true") {
            showResults();
        } else {
            if (savedIndex !== null) {
                currentQuestionIndex = parseInt(savedIndex, 10);
            }
            loadQuestion();
        }
    };
</script>
